<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Date Jugaad - Delete Data Request</title>
    <style>
      :root {
        --bg: #f8f5ef;
        --card: #ffffff;
        --text: #171717;
        --muted: #6b7280;
        --border: #e5e7eb;
        --accent: #111111;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, #f8f5ef 0%, #fffdf8 100%);
        color: var(--text);
        padding: 24px;
      }

      .page {
        min-height: calc(100vh - 48px);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        width: 100%;
        max-width: 520px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 16px 40px rgba(17, 17, 17, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 30px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 16px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
        font: inherit;
        color: var(--text);
        background: #ffffff;
      }

      input:focus,
      textarea:focus {
        outline: 2px solid #d6d3d1;
        outline-offset: 1px;
        border-color: #d6d3d1;
      }

      textarea {
        min-height: 140px;
        resize: vertical;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 14px;
        background: var(--accent);
        color: #ffffff;
        font: inherit;
        font-weight: 600;
        padding: 14px 18px;
        cursor: pointer;
      }

      button:hover {
        opacity: 0.92;
      }

      .note,
      .success {
        font-size: 13px;
        color: var(--muted);
      }

      .success {
        display: none;
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 14px;
        background: #f3f4f6;
        color: var(--text);
      }

      .success.visible {
        display: block;
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        .page {
          min-height: calc(100vh - 32px);
        }

        .card {
          padding: 22px;
          border-radius: 18px;
        }

        h1 {
          font-size: 26px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="card">
        <h1>Delete Data Request</h1>
        <p>
          If you want your data removed from Date Jugaad, fill out this form and
          submit your request.
        </p>

        <form id="delete-form">
          <div>
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Enter your name" required />
          </div>

          <div>
            <label for="age">Age</label>
            <input id="age" name="age" type="number" min="1" max="120" placeholder="Enter your age" required />
          </div>

          <div>
            <label for="reason">Reason</label>
            <textarea
              id="reason"
              name="reason"
              placeholder="Tell us why you want your data deleted"
              required
            ></textarea>
          </div>

          <button type="submit">Submit Request</button>
        </form>

        <div id="success" class="success" role="status" aria-live="polite">
          Your delete request has been recorded.
        </div>

        <p class="note">
          This is a simple request page. Connect the form to your backend or email
          workflow if you want to store or process submissions automatically.
        </p>
      </section>
    </div>

    <script>
      (function () {
        var form = document.getElementById("delete-form");
        var success = document.getElementById("success");

        form.addEventListener("submit", function (event) {
          event.preventDefault();
          success.classList.add("visible");
          form.reset();
        });
      })();
    </script>
  </body>
</html>
